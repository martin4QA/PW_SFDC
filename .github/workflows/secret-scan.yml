name: Secret scan (gitleaks)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important: scan full history in PRs

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --verbose
